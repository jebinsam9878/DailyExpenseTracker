<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sign up - Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pchxda5jLzQ6PqfQh2JgRFS2GQG6q0ivIXv1PR+lTm2TXzr+fo1M5d9p8q5Yq6T0LmKdivo9egD1ypA8+2DzNQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="text-light" style="font-family: 'Inter', sans-serif;">
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand centered-brand" href="{{ url_for('home') }}">Expense Tracker</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>
</nav>

<div class="container d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="fas fa-user-plus" style="font-size:3rem;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
          <h1 class="h4 mt-3 mb-1">Create your account</h1>
          <p class="text-muted small mb-0">One login per person. All your expenses stay under this profile.</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}">
          <div class="mb-3">
            <label class="form-label small">Full name</label>
            <input type="text" class="form-control" name="name" placeholder="Your name" required>
          </div>
          <div class="mb-3">
            <label class="form-label small">Email</label>
            <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Create a password" required>
          </div>
          <div class="mb-3">
            <label class="form-label small">Confirm password</label>
            <input type="password" class="form-control" name="confirm_password" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="btn btn-accent w-100 mb-3">
            <i class="fas fa-user-check me-2"></i>Sign up
          </button>
          <p class="text-center text-muted small mb-0">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-decoration-none">Log in</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
